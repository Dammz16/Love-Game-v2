<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Duel</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
}

#menu,#game{padding:20px;}
#game{display:none;}

.card{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:20px;
margin:10px;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:12px;
cursor:pointer;
}

#randomBtn{
background:orange;
color:white;
font-weight:bold;
}

#mainButton{
background:white;
color:black;
}

#rematchBtn{
display:none;
}
</style>

</head>

<body>

<div id="menu">
<h1>Duel 1vs1</h1>

<input id="playerName" placeholder="Prénom">

<button id="joinGame">Rejoindre</button>

<div id="menuError"></div>
</div>

<div id="game">

<div class="card">
<div id="turnBanner"></div>
</div>

<div class="card">
<div id="actionText">Attente...</div>
<div id="actionPoints"></div>
</div>

<button id="mainButton">Action</button>
<button id="randomBtn">Random x2</button>

<button id="rematchBtn">Rejouer</button>

</div>

<script src="frontend.js"></script>

</body>
</html>
