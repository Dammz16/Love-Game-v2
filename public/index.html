<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duel 1vs1 Moderne</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    text-align: center;
    margin: 0;
    padding: 0;
}
input, select, button {
    font-size: 18px;
    padding: 12px;
    margin: 10px;
    border-radius: 12px;
}
button {
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.15s, box-shadow 0.15s;
}
button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
#menu, #game {
    margin-top: 50px;
}
#currentAction {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    margin: 30px auto;
    max-width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    font-size: 1.3rem;
    transition: transform 0.3s, background 0.3s;
}
#currentAction.easy { background: rgba(72,187,120,0.8); }
#currentAction.medium { background: rgba(250,204,21,0.8); }
#currentAction.hard { background: rgba(231,76,60,0.8); }
#notification {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 1rem;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
}
#notification.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
#scores { margin-top: 20px; font-size: 20px; }
#scoreList li {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    color: #fff;
    padding: 10px 20px;
    margin: 6px;
    border-radius: 12px;
    font-weight: 600;
    transition: transform 0.2s;
}
#scoreList li.update { transform: scale(1.2); }
#replayBtn {
    display: none;
    background: #ff6b6b;
    color: white;
    padding: 16px 32px;
    font-size: 1.2rem;
    border-radius: 24px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}
#replayBtn:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
.hidden { display:none; }
</style>
</head>
<body>

<div id="menu">
    <h1>🎮 Duel 1vs1 Moderne</h1>
    <input type="text" id="playerName" placeholder="Ton prénom">
    <button id="joinGame">Rejoindre la partie</button>
    <p id="menuError" style="color:red"></p>
</div>

<div id="game" style="display:none;">
    <h2 id="currentTurn">Tour de :</h2>
    <select id="difficulty">
        <option value="easy">Facile</option>
        <option value="medium">Moyen</option>
        <option value="hard">Difficile</option>
    </select>
    <button id="drawBtn">Tirer une action</button>

    <div id="currentAction"></div>
    <button id="completeBtn" class="hidden">Valider</button>

    <div id="notification"></div>

    <div id="scores">
        <h3>Scores</h3>
        <ul id="scoreList"></ul>
    </div>

    <button id="replayBtn">Rejouer</button>
</div>

<script src="frontend.js"></script>
</body>
</html>
