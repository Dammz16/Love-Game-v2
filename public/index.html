<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duel 1vs1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

html,body{
height:100%;
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
display:flex;
justify-content:center;
align-items:center;
}

/* MENU */

#menu{
background:rgba(255,255,255,0.12);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 15px 35px rgba(0,0,0,0.25);
text-align:center;
}

input{
border:none;
outline:none;
padding:12px 16px;
border-radius:12px;
font-size:16px;
width:200px;
margin-right:10px;
}

button{
border:none;
cursor:pointer;
font-weight:600;
background:#ff6b6b;
color:white;
padding:12px 22px;
border-radius:12px;
transition:all 0.2s ease;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

#menuError{
color:black;
font-weight:600;
margin-top:12px;
background:rgba(255,255,255,0.7);
padding:6px 12px;
border-radius:8px;
display:inline-block;
}

#menuError:empty{
display:none;
}

/* GAME */

#game{
display:none;
text-align:center;
}

@keyframes pulseTurn{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.myTurn{
animation:pulseTurn 1s infinite;
color:#ffe066;
}

.actionCard{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:20px;
margin:30px auto;
max-width:360px;
font-size:1.3rem;
}

/* scores */

#scoreList{
display:flex;
justify-content:center;
gap:12px;
padding:0;
}

#scoreList li{
list-style:none;
background:rgba(255,255,255,0.12);
padding:10px 20px;
border-radius:12px;
min-width:120px;
}

/* progress */

.progressContainer{
width:220px;
margin:8px auto;
}

.progressBar{
height:10px;
background:rgba(255,255,255,0.25);
border-radius:10px;
overflow:hidden;
}

.progressFill{
height:100%;
background:#4ade80;
width:0%;
transition:width 0.4s ease;
}

/* history */

#historyList{
list-style:none;
padding:0;
max-width:300px;
margin:auto;
}

#historyList li{
background:rgba(255,255,255,0.12);
margin:6px 0;
padding:8px;
border-radius:8px;
font-size:14px;
}

/* popup points */

#pointsPopup{
position:fixed;
top:40%;
left:50%;
transform:translateX(-50%);
font-size:40px;
font-weight:bold;
opacity:0;
transition:opacity 0.5s, transform 0.5s;
}

#pointsPopup.show{
opacity:1;
transform:translate(-50%,-20px);
}

/* notification */

#notification{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:12px 24px;
border-radius:24px;
opacity:0;
transition:opacity 0.3s;
}

#notification.show{
opacity:1;
}

</style>

</head>

<body>

<div id="menu">

<h1>🎮 Duel 1vs1</h1>

<input type="text" id="playerName" placeholder="Ton prénom">

<button id="joinGame">Rejoindre la partie</button>

<p id="menuError"></p>

</div>

<div id="game">

<h2 id="currentTurn"></h2>

<select id="difficulty">
<option value="easy">Facile</option>
<option value="medium">Moyen</option>
<option value="hard">Difficile</option>
</select>

<button id="drawBtn">Tirer une action</button>

<div id="currentAction" class="actionCard"></div>

<button id="completeBtn" style="display:none;">Valider</button>

<h3>Scores</h3>
<ul id="scoreList"></ul>

<div id="progressBars"></div>

<h3>Historique</h3>
<ul id="historyList"></ul>

<button id="rematchBtn" style="display:none;">Revanche</button>

<div id="pointsPopup"></div>

<div id="notification"></div>

</div>

<script src="frontend.js"></script>

</body>
</html>
